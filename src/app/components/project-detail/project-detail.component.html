@if (project) {

<div class="detail-container">

  <div class="project-card" [appPriorityColor]="project.priority">

    <h1>{{ project.title }}</h1>

    <div class="info">
      <span class="label">Matière</span>
      <span>{{ project.subject }}</span>
    </div>

    <div class="info">
      <span class="label">Description</span>
      <span>{{ project.description }}</span>
    </div>

    <div class="info">
      <span class="label">Date limite</span>
      <span>{{ project.deadline }}</span>
    </div>

    <div class="badges">

      <span class="status">
        <span class="label">Statut : </span>
        {{ project.status }}
      </span>

      <span class="priority">
        <span class="label">Priorité : </span>
        {{ project.priority }}
      </span>

    </div>

  </div>

</div>

}

@if (!project) {

<p class="error">Projet introuvable</p>

}
